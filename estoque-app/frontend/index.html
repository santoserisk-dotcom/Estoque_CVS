<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0066CC" />
  <title>Estoque Total</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/responsive.css" />
</head>
<body>
  <div class="app-shell">
    <main class="content-area">
      <section id="loginScreen" class="screen active login-screen">
        <div class="login-wrapper">
          <div class="card login-card">
            <div class="login-brand">
              <h1>Estoque Total</h1>
              <p class="subtitle">Acesse o sistema</p>
            </div>
            <label class="field-label">
              <span>Senha da equipe</span>
              <div class="password-toggle-container">
                <input id="senhaEquipe" name="senhaEquipe" type="password" autocomplete="off" placeholder="Senha" />
                <button id="togglePassword" type="button" class="password-toggle" aria-label="Alternar visibilidade da senha">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                    <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </label>
            <label class="field-label">
              <span>PIN do técnico</span>
              <input id="pinTecnico" name="pinTecnico" type="text" inputmode="numeric" pattern="\\d*" maxlength="4" autocomplete="off" placeholder="PIN" />
            </label>
            <button id="btnLogin" type="button" class="button primary">Entrar</button>
            <div id="loginError" class="form-error"></div>
          </div>
        </div>
      </section>

      <section id="mainScreen" class="screen home-screen">
        <header class="home-header">
          <div>
            <h1>Estoque Total</h1>
            <p id="tecnicoNomeHeader" class="subtitle">Acesse para começar</p>
          </div>
          <div class="sync-panel">
            <button id="btnSync" class="button secondary">Sincronizar</button>
            <p id="syncDetails" class="sync-details">Última sync: - | Pendentes: 0</p>
          </div>
        </header>

        <div class="dashboard-grid">
          <div class="card metric-card">
            <span>Categorias</span>
            <strong id="totalCategorias">0</strong>
          </div>
          <div class="card metric-card">
            <span>Críticos</span>
            <strong id="totalCriticos">0</strong>
          </div>
        </div>

        <div class="card search-card">
          <input id="searchInput" type="search" placeholder="Buscar item" />
          <div id="homeSearchResults" class="search-results"></div>
        </div>

        <div class="card quick-grid" id="quickCategories"></div>

        <div class="card critical-list-card">
          <div class="card-header">
            <h2>Estoque Crítico</h2>
            <button id="btnViewAllCriticos" class="ghost-button">Ver todos</button>
          </div>
          <div id="criticalList" class="critical-list"></div>
        </div>
      </section>

      <section id="itemsScreen" class="screen">
        <div class="screen-header">
          <button class="ghost-button" id="backToHomeFromItems">← Voltar</button>
          <h2 id="categoryTitle">Categoria</h2>
        </div>
        <div id="itemsContainer" class="item-list"></div>
      </section>

      <section id="withdrawScreen" class="screen">
        <div class="screen-header">
          <button class="ghost-button" id="backToHomeFromWithdraw">← Voltar</button>
          <h2>Retirar item</h2>
        </div>
        <div class="card withdraw-card">
          <p class="withdraw-title" id="withdrawItemName"></p>
          <p id="withdrawItemStock" class="withdraw-stock"></p>
          <div class="quantity-control">
            <button id="qtdeMenos" class="quantity-button">-</button>
            <span id="qtdeValor">1</span>
            <button id="qtdeMais" class="quantity-button">+</button>
          </div>
          <div id="patrimoniosContainer" class="patrimonios-panel">
            <p>Patrimônios</p>
            <div id="patrimoniosList"></div>
          </div>
          <label class="field-label">
            <span>Observação (opcional)</span>
            <textarea id="observacao" rows="3" placeholder="Motivo da retirada"></textarea>
          </label>
          <button id="btnConfirmar" class="button primary">Confirmar retirada</button>
          <div id="withdrawError" class="form-error"></div>
        </div>
      </section>

      <section id="searchScreen" class="screen">
        <div class="screen-header">
          <button class="ghost-button" id="backToHomeFromSearch">← Voltar</button>
          <h2>Buscar item</h2>
        </div>
        <div class="search-panel">
          <input id="globalSearchInput" type="search" placeholder="Digite mínimo 2 caracteres" />
          <div id="searchResults" class="search-results"></div>
        </div>
      </section>

      <section id="recentesScreen" class="screen">
        <div class="screen-header">
          <button class="ghost-button" id="backToHomeFromRecentes">← Voltar</button>
          <h2>Retiradas recentes</h2>
        </div>
        <div id="recentesList" class="history-list"></div>
      </section>

      <section id="criticosScreen" class="screen">
        <div class="screen-header">
          <button class="ghost-button" id="backToHomeFromCriticos">← Voltar</button>
          <h2>Itens críticos</h2>
        </div>
        <div id="criticosList" class="history-list"></div>
      </section>
    </main>

    <footer class="bottom-nav">
      <button class="nav-item active" data-nav="home">Home</button>
      <button class="nav-item" data-nav="recentes">Recentes</button>
      <button class="nav-item" data-nav="criticos">Crítico</button>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
